name: Build and Commit Windows Executable

on:
  push:
    branches:
      - main
    paths:
      - 'main.py'
      - 'assets/**'
      - 'requirements.txt'

permissions:
  contents: write

jobs:
  build:
    name: Build & Commit Windows EXE
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Windows EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --add-data "assets;assets" --name Notion-Pomodoro-Timer main.py

    - name: Commit and push executable
      run: |
        mkdir -p bin
        cp dist/Notion-Pomodoro-Timer.exe bin/Notion-Pomodoro-Timer.exe
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add bin/Notion-Pomodoro-Timer.exe
        # Only commit and push if there are changes
        git diff-index --quiet HEAD || (git commit -m "build: update Windows executable [skip ci]" && git push origin main)
      shell: bash
