name: Build Multi-Platform Releases

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: Notion-Pomodoro-Timer.exe
            pyinstaller_args: --add-data "assets;assets"
          - os: ubuntu-latest
            artifact_name: Notion-Pomodoro-Timer-Linux
            pyinstaller_args: --add-data "assets:assets"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed ${{ matrix.pyinstaller_args }} --name ${{ matrix.artifact_name }} main.py

    - name: Rename build output (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        mv dist/${{ matrix.artifact_name }} dist/Notion-Pomodoro-Timer-Linux

    - name: Rename build output (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        mv dist/${{ matrix.artifact_name }} dist/Notion-Pomodoro-Timer-Windows.exe

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Notion-Pomodoro-${{ matrix.os }}
        path: |
          dist/Notion-Pomodoro-Timer-Windows.exe
          dist/Notion-Pomodoro-Timer-Linux

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/Notion-Pomodoro-Timer-Windows.exe
          dist/Notion-Pomodoro-Timer-Linux
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
